---

- name: enable maintenance mode
  template:
    src: maintenance.html.j2
    dest: "/etc/nginx/maintenance.html"
    owner: www-data
    group: www-data
  become: yes
  become_user: root

- name: stop sidekiq
  service:
    name: sidekiq
    state: stopped
  become: yes
  become_user: root

- name: stop redis-jobs
  service:
    name: redis-jobs
    state: stopped
  become: yes
  become_user: root

- name: stop puma
  service:
    name: puma
    state: stopped
  become: yes
  become_user: root
