---
# Install Google Chrome for Ferrum/FerrumPDF headless browser rendering.
#
# Ferrum requires a Chrome/Chromium binary to render PDFs and take
# screenshots. We use Google Chrome (stable) from the official repository.

- name: add google chrome signing key
  apt_key:
    url: https://dl-ssl.google.com/linux/linux_signing_key.pub
  become: yes

- name: add google chrome repository
  apt_repository:
    repo: "deb http://dl.google.com/linux/chrome/deb/ stable main"
    filename: google-chrome
  become: yes

- name: install google chrome stable
  apt:
    name: google-chrome-stable
    state: present
    update_cache: yes
  become: yes

# Runtime libraries required by headless Chrome that may not be pulled
# in automatically on minimal Ubuntu server installations.
- name: install headless chrome runtime dependencies
  apt:
    name:
      - libgbm1          # GPU buffer management, required even in headless mode
      - libxshmfence1    # Shared memory fences for X11 shm rendering
    state: present
  become: yes
